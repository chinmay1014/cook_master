<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap');
@import "tailwindcss";

@theme {
  --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
  --font-display: "Outfit", sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background-image: url('https://images.unsplash.com/photo-1556910110-a5a63dfd393c?q=80&w=2574&auto=format&fit=crop');
  background-size: cover;
  background-attachment: fixed;
  background-position: center;
  background-repeat: no-repeat;
}

/* Glass overlay for the entire body to ensure readability */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(
    135deg,
    rgba(255, 255, 255, 0.7) 0%,
    rgba(255, 255, 255, 0.3) 100%
  );
  backdrop-filter: blur(8px);
  z-index: -1;
}

@media (prefers-color-scheme: dark) {
  body::before {
    background: linear-gradient(
      135deg,
      rgba(17, 24, 39, 0.85) 0%,
      rgba(17, 24, 39, 0.6) 100%
    );
  }
}

.glass-panel {
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
}

@media (prefers-color-scheme: dark) {
  .glass-panel {
    background: rgba(31, 41, 55, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }
}
</style>
</head>
